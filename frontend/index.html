<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Mini Projet API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet" />
    <style>
      body { background-color: #ffe4ec; margin: 0; font-size: 20px; }
      * { font-family: 'Cormorant Garamond', serif; color: #2d6a4f; }
      h1, h2, h3 { color: #6b1a2a; }
      h1 { font-style: italic; }
      h2, h3 { font-style: normal; }
      #muguet {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        opacity: 0.28;
        mix-blend-mode: multiply;
        z-index: 0;
        pointer-events: none;
      }
      #root {
        position: relative;
        z-index: 1;
        display: flex;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="muguet">
      <img src="/muget-poem.png" alt="" width="460"/>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
